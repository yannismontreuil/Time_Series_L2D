plot_shift: 1
plot_target: "y"
plot_synth_preview: false
plot_time_series_pdf: false
plot_time_series_png: false

transition_log:
  enabled: false

environment:
  data_source: jena
  csv_path: data/jena_climate_2009_2016.csv
  target_column: "T (degC)"
  row_stride: 24
  T: 6000
  seed: 11
  data_seed: 42
  num_experts: 5
  num_regimes: 2
  state_dim: 13
  context_columns: ["p (mbar)", "rh (%)", "wv (m/s)"]
  context_lags: [1, 6, 42, 180]
  include_time_features: true
  time_features: [hour, dayofweek, month]
  normalize_context: true
  normalization_window: 2190
  normalization_eps: 1.0e-6
  normalization_mode: "zscore"
  expert_archs: [ar, ar, arima, arima, ar]
  expert_pred_noise_std: [0.04, 0.07, 0.03, 0.05, 0.03]
  arima_lags: [1, 6, 42, 180]
  arima_diff_order: 0
  unavailable_expert_idx: [2, 3]
  unavailable_intervals:
    - [1200, 2200]
    - [2800, 4200]
  analysis_window: 180

routers:
  beta: 0.0
  staleness_threshold: null
  lambda_risk: -0.1
  slds_imm:
    enabled: false
  slds_imm_em:
    enabled: false
  slds_imm_corr:
    enabled: false
  slds_imm_corr_em:
    enabled: false
  factorized_slds:
    enabled: true
    feedback_mode: partial
    include_no_g: false
    label_with_g: "M=2"
    num_regimes: 2
    shared_dim: 1
    idiosyncratic_dim: 13
    delta_max: 1500
    R_scalar: 0.1
    A_g:
      - [[0.985]]
      - [[0.975]]
    Q_g_scales: [0.04, 0.06]
    A_u_scale: [0.993, 0.987]
    Q_u_scales: [0.01, 0.015]
    exploration: ["g"]
    exploration_mc_samples: 1
    exploration_diag_enabled: false
    init_R_mode: empirical_expert
    init_R_window: 1500
    init_R_use_available: true
    init_R_floor: 1.0e-4
    init_R_print: true
    init_state_from_residuals: u
    init_state_window: 1500
    init_state_u_scale: 1.0
    init_state_g_scale: 0.3
    init_state_print: true
    em_enabled: false
    em_online_enabled: false
    transition_mode: attention
    transition_init: uniform
    seed: 42

baselines: {}

analysis:
  baselines_train_from_start: true
  print_available_only: false
  print_last_window: false
  tri_cycle_corr:
    enabled: false
  pruning:
    enabled: false
