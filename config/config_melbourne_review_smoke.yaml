plot_shift: 1
plot_target: "y"
plot_synth_preview: false
plot_time_series_pdf: false
plot_time_series_png: false

transition_log:
  enabled: false
  print: false
  precision: 4
  stride: 1
  print_wlin_blin: false
  plot: false
  plot_show: false
  plot_save: false
  plot_na: false
  online_only: true
  plot_only_ours: true
  plot_entropy: false

environment:
  data_source: merlbourne
  csv_path: data/daily-minimum-temperatures-in-me.csv
  target_column: "Daily minimum temperatures in Melbourne, Australia, 1981-1990"
  T: 2200
  seed: 11
  data_seed: 42
  num_experts: 5
  num_regimes: 4
  state_dim: 8
  context_lags: [1, 7, 30, 365]
  include_time_features: true
  time_features: [dayofweek, month]
  normalize_context: true
  normalization_window: 730
  normalization_eps: 1.0e-6
  normalization_mode: "zscore"
  expert_archs: [ar, ar, arima, arima, arima]
  expert_pred_noise_std: [0.1, 0.1, 0.06, 0.1, 0.06]
  arima_lags: [1, 7, 30, 365]
  arima_diff_order: 0
  unavailable_expert_idx: [2, 3]
  unavailable_intervals:
    - [800, 1200]
    - [500, 1500]
  analysis_window: 365

routers:
  beta: 0.0
  staleness_threshold: null
  lambda_risk: -0.1
  slds_imm:
    enabled: false
  slds_imm_em:
    enabled: false
  slds_imm_corr:
    enabled: false
  slds_imm_corr_em:
    enabled: false
  factorized_slds:
    enabled: true
    feedback_mode: partial
    include_no_g: true
    label_with_g: "L2D-SLDS w/ $g_t$"
    label_no_g: "L2D-SLDS w/o $g_t$"
    num_regimes: 4
    shared_dim: 2
    idiosyncratic_dim: 8
    delta_max: 2000
    R_scalar: 0.05
    A_g:
      - [[0.98, 0.0], [0.0, 0.98]]
      - [[0.97, 0.0], [0.0, 0.97]]
      - [[0.96, 0.0], [0.0, 0.96]]
      - [[0.95, 0.0], [0.0, 0.95]]
    Q_g_scales: [0.08, 0.1, 0.12, 0.14]
    A_u_scale: [0.98, 0.97, 0.96, 0.95]
    Q_u_scales: [0.05, 0.06, 0.07, 0.08]
    exploration: ["g_z"]
    exploration_diag_enabled: false
    init_R_mode: empirical_expert
    init_R_window: 730
    init_R_use_available: true
    init_R_floor: 1.0e-4
    init_R_print: true
    init_state_from_residuals: u
    init_state_window: 730
    init_state_u_scale: 1.0
    init_state_g_scale: 0.3
    init_state_print: true
    em_enabled: false
    em_online_enabled: false
    transition_mode: "attention"
    transition_init: uniform
    seed: 11

baselines:
  linucb:
    alpha_ucb: 5
    l2_reg: 1.0
    feedback_mode: partial
  shared_linucb:
    alpha_ucb: 3.0
    lambda_reg: 1.0
    feedback_mode: partial
    include_shared_context: true
    include_arm_bias: true
    include_arm_interactions: true
  neural_ucb:
    alpha_ucb: 5
    lambda_reg: 1.0
    hidden_dim: 16
    nn_learning_rate: 0.001
    feedback_mode: partial
  lin_ts:
    lambda_reg: 1.0
    posterior_scale: 0.75
    feedback_mode: partial
    include_shared_context: true
    include_arm_bias: true
    include_arm_interactions: true
  ensemble_sampling:
    ensemble_size: 16
    lambda_reg: 1.0
    obs_noise_std: 1.0
    feedback_mode: partial
    include_shared_context: true
    include_arm_bias: true
    include_arm_interactions: true

analysis:
  baselines_train_from_start: true
  print_available_only: true
  print_last_window: true
  tri_cycle_corr:
    enabled: false
  pruning:
    enabled: false
